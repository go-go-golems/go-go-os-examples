name: Publish static site artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish static artifact image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute image tags
        id: image
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "short-sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/go-go-golems/go-go-os-examples-static" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push static artifact image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.static
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.image }}:sha-${{ steps.image.outputs.short-sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/go-go-golems/go-go-os-examples
            org.opencontainers.image.description=Static Vite artifact for go-go-os public examples
            org.opencontainers.image.revision=${{ github.sha }}
